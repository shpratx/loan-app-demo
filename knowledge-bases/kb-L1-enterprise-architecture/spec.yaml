    Enterprise-level architecture standards for a fintech loan application platform.
    This KB provides the canonical reference for technology stack, architecture patterns,
    API standards, data architecture, security architecture, infrastructure, and
    non-functional requirements. All design and construction agents MUST ground their
    decisions in this KB. Any deviation requires Architecture Review Board (ARB) approval.

