spec_version: "1.0"
artifact_type: knowledge_base
metadata:
  name: kb-L2-payments-domain
  version: "1.0.0"
  layer: L2
  owner: lending-domain-champion
  content_hash: "sha256:auto-computed-on-publish"
  last_reviewed: "2026-04-19"
