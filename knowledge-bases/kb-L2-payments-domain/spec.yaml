purpose:
  description: >
    Domain knowledge base for payments and lending in a UK fintech context.
    Covers the full lending lifecycle (origination to closure), payment flows,
    regulatory obligations (FCA, PSD2, GDPR, Consumer Credit Act), affordability,
    pricing, collections, and domain terminology. Designed to give product managers
    and AI agents the domain depth needed to create accurate, regulation-aware
    epics, stories, and acceptance criteria without inventing or hallucinating
    domain rules.

scope:
  attached_to: "Inception and design agents (A1, A2, A3, A5, A7, A10)"
  override_policy: "Domain rules in this KB reflect UK regulatory requirements. No agent may contradict them."

